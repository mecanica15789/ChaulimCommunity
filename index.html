<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CHAULIM COMMUNITY</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:850px;
background:#111;
border-radius:12px;
box-shadow:0 0 40px rgba(255,0,60,0.25);
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#ff003c;
}

textarea{
width:100%;
height:150px;
background:#1e1e1e;
border:none;
color:white;
padding:10px;
border-radius:8px;
margin-bottom:10px;
resize:none;
}

.buttons{
display:flex;
gap:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.obf{background:#ff003c;}
.copy{background:#0099ff;}
.download{background:#00c77a;}

</style>
</head>

<body>

<div class="container">

<h1>CHAULIM COMMUNITY</h1>

<textarea id="input" placeholder="Cole seu código Lua..."></textarea>

<div class="buttons">
<button class="obf" onclick="obfuscate()">OFUSCAR</button>
<button class="copy" onclick="copyCode()">COPIAR</button>
<button class="download" onclick="downloadLua()">BAIXAR</button>
</div>

<textarea id="output" placeholder="Código protegido..."></textarea>

</div>

<script>

// RANDOM NAME
function rand(){
let c="abcdefghijklmnopqrstuvwxyz"
let n="_"
for(let i=0;i<10;i++){
n+=c[Math.floor(Math.random()*c.length)]
}
return n
}

// BASE64
function b64(s){
return btoa(unescape(encodeURIComponent(s)))
}

// REVERSE
function rev(s){
return s.split("").reverse().join("")
}

// SHIFT CHAR
function shift(s){
let r=""
for(let i=0;i<s.length;i++){
r+=String.fromCharCode(s.charCodeAt(i)+2)
}
return r
}

// BYTES
function toBytes(s){
let a=[]
for(let i=0;i<s.length;i++){
a.push(s.charCodeAt(i))
}
return a
}

function obfuscate(){

let code = document.getElementById("input").value
if(!code) return alert("Cola algo!")

// CAMADAS
let c1 = b64(code)       // base64
let c2 = rev(c1)         // reverse
let c3 = shift(c2)       // shift
let bytes = toBytes(c3)  // bytes

// NOMES RANDOM
let v = rand()
let f1 = rand()
let f2 = rand()
let f3 = rand()
let exec = rand()

let lua = `
local ${v}={${bytes.join(",")}}

local function ${f1}(t)
 local s=""
 for i=1,#t do s=s..string.char(t[i]) end
 return s
end

local function ${f2}(s)
 local r=""
 for i=1,#s do r=r..string.char(s:byte(i)-2) end
 return r
end

local function ${f3}(s)
 return s:reverse()
end

local b='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/='

local function b64d(data)
 data = string.gsub(data, '[^'..b..'=]', '')
 return (data:gsub('.', function(x)
  if x == '=' then return '' end
  local r,f='',(b:find(x)-1)
  for i=6,1,-1 do
   r = r .. (f%2^i - f%2^(i-1) > 0 and '1' or '0')
  end
  return r
 end):gsub('%d%d%d?%d?%d?%d?%d?%d?', function(x)
  if #x ~= 8 then return '' end
  local c=0
  for i=1,8 do
   c = c + (x:sub(i,i)=='1' and 2^(8-i) or 0)
  end
  return string.char(c)
 end))
end

local ok,err = pcall(function()

 local s=${f1}(${v})
 s=${f2}(s)
 s=${f3}(s)
 s=b64d(s)

 local ${exec}=load(s)
 if ${exec} then ${exec}() end

end)

if not ok then print("CHAULIM ERROR: "..tostring(err)) end
`

document.getElementById("output").value = lua
}

// COPY
function copyCode(){
let t = document.getElementById("output").value
if(!t) return alert("Nada")
navigator.clipboard.writeText(t)
alert("Copiado!")
}

// DOWNLOAD
function downloadLua(){
let t = document.getElementById("output").value
if(!t) return alert("Nada")

let blob = new Blob([t], {type:"text/plain"})
let a = document.createElement("a")
a.href = URL.createObjectURL(blob)
a.download = "CHAULIM_protegido.lua"
a.click()
}

</script>

</body>
</html>
